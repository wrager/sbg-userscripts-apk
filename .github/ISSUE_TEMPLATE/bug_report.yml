name: "\U0001F41B Баг-репорт"
description: Сообщить об ошибке в приложении
labels: [bug]
body:
  - type: textarea
    id: diagnostics
    attributes:
      label: Диагностика
      description: Вставьте из буфера обмена (Ctrl+V) — данные копируются автоматически при нажатии «Сообщить об ошибке» в настройках
      render: text
      placeholder: (вставьте скопированные данные диагностики)

  - type: input
    id: apk-version
    attributes:
      label: Версия APK
      placeholder: "0.12.0"
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Версия Android / WebView
      placeholder: "14 (API 34) (WebView 120.0.6099.144)"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Устройство
      placeholder: "Google Pixel 7"

  - type: textarea
    id: scripts
    attributes:
      label: Скрипты
      description: Список скриптов и их статус (заполняется автоматически при создании через кнопку в настройках)
      placeholder: |
        ✅ SVP v0.6.0
        ⏳ EUI v1.2.0
        ⬜ CUI v0.8.0
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      placeholder: |
        1. Открыть приложение
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
      placeholder: Что должно было произойти?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
      placeholder: Что произошло на самом деле?
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Дополнительная информация
      description: Скриншоты, видео, любой дополнительный контекст
