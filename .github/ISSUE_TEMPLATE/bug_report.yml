name: Баг-репорт
description: Сообщить об ошибке в приложении
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Описание
      description: Что произошло?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      description: Как воспроизвести проблему?
      placeholder: |
        1. Открыть приложение
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
      description: Что должно было произойти?
    validations:
      required: true

  - type: input
    id: apk-version
    attributes:
      label: Версия APK
      placeholder: "0.11.0"
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Версия Android / WebView
      placeholder: "14 (API 34) (WebView 120.0.6099.144)"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Устройство
      placeholder: "Google Pixel 7"

  - type: textarea
    id: scripts
    attributes:
      label: Включённые скрипты
      description: Какие юзерскрипты были активны? (автоматически заполняется из приложения)
      placeholder: |
        - SVP v0.6.0
        - EUI v1.2.0

  - type: textarea
    id: diagnostics
    attributes:
      label: Диагностика
      description: Вставьте диагностику из буфера обмена (скопирована автоматически при нажатии «Сообщить об ошибке»)
      render: text

  - type: textarea
    id: screenshots
    attributes:
      label: Скриншоты
      description: Скриншоты, если есть
